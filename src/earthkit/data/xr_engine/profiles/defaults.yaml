# variables
variable_key: parameter.variable
drop_variables: []
rename_variables: {}
mono_variable: false
# dimensions
extra_dims: []
drop_dims: []
ensure_dims: []
fixed_dims: []
split_dims: []
rename_dims: {}
dims_as_attrs: []
time_dims:
- forecast_reference_time
- step
level_dim_mode: level
squeeze: true
# attributes
attrs_mode: "fixed"
attrs: []
variable_attrs: []
global_attrs: []
add_earthkit_attrs: true
rename_attrs:
  cfName: standard_name
  name: long_name
add_valid_time_coord: false
add_geo_coords: true
decode_times: true
decode_timedelta:
# values
flatten_values: false
dtype: float64
array_namespace: numpy
# other
lazy_load: true
release_source: false
direct_backend: false
strict: false
errors: raise
allow_holes: false
dim_roles:
  member: ensemble.member
  forecast_reference_time: time.forecast_reference_time
  step: time.step
  valid_time: time.valid_datetime
  date: time.base_date
  time: time.base_time
  level: vertical.level
  level_type: vertical.level_type
dim_name_from_role_name: true
coord_attrs:
  latitude:
    units: degrees_north
    standard_name: latitude
    long_name: latitude
  longitude:
    units: degrees_east
    standard_name: longitude
    long_name: longitude
  forecast_reference_time:
    # "units": "seconds since 1970-01-01T00:00:00",
    # "calendar": "proleptic_gregorian",
    standard_name: forecast_reference_time
    long_name: initial time of forecast
  step:
    # "units": "hours",
    standard_name: forecast_period
    long_name: time since forecast_reference_time
  forecast_period:
    # "units": "hours",
    standard_name: forecast_period
    long_name: time since forecast_reference_time
  valid_time:
    # "units": "seconds since 1970-01-01T00:00:00",
    # "calendar": "proleptic_gregorian",
    standard_name: time
    long_name: valid_time
